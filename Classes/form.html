<!DOCTYPE html>
<html lang="en">            
<head>
    
    <title>Registration Form</title>  
</head>
<body>
    <h2>
         FORM
    </h2>
    <form  method="get" action="https://www.futureskillsprime.in/">
        <label><input type="text" name="name" placeholder="Enter Your name"></label>
        <br><br>
        <label><input type="email" name="email" placeholder="Enter your mail"></label>
        <br><br>
        <label><input type="password" name="password" placeholder="Enter your password"></label>
        <br><br>
        <label><input type="number" name="age" placeholder="Enter your age"></label>
        <br><br>
        <label><input type="tel" name="phone" placeholder="Enter your phone number"></label>
        <br><br>
        <label>
            <input type="radio" name="gender" value="male"> Male 
            <input type="radio" name="gender" value="female"> Female
            <input type="radio" name="gender" value="other"> Other
            <input type="radio" name="gender" value="prefer_not_to_say"> Prefer not to say
        </label>
        <br><br>
        <label><input type="date" name="date"></label>
        <br><br>
        <input type="textarea" name="address" placeholder="Enter your address">
    
        <button type="submit">Submit</button> <!--reset-->

    </form>

</body>
</html>
