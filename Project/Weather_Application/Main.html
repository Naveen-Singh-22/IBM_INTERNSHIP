<!DOCTYPE html>
<html lang="en">
<head>
  
  <title>Weather Application</title>
  <link rel="stylesheet" href="Style.css">
</head>
<body>
  <header>
    Weather Application
  </header>
  <div class="weather-container">
    <form class="search-bar" id="search">
      <input type="text" id="cityInput" placeholder="Enter city name" required>
      <button type="submit" id="searchBtn">Search</button>
    </form>
    <div class="current-weather" id="currentWeather">
      <div class="weather-main">
        <img id="weatherIcon" src="" alt="Weather Icon" style="display:none;" />
        <div class="weather-info">
          <div id="temperature">Temperature: --°C</div>
          <div id="humidity">Humidity: --%</div>
          <div id="wind">Wind Speed: -- m/s</div>
        </div>
      </div>
      <div id="weatherDescription"></div>
    </div>
    <div class="forecast">
      <div class="forecast-title">Forecast</div>
      <div class="forecast-list" id="forecast">
        <!-- Forecast info will go here -->
      </div>
    </div>
  </div>
  <script src="Script.js"></script>
</body>
</html>
