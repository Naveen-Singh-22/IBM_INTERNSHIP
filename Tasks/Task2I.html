 <!-- Design an HTML form for user login that includes username and password fields. Use HTML5 attributes such as required, placeholder, and type to ensure basic input validation. -->
  <DOCTYPE html>
    <html>
        <head>
            <title>Login Form</title>
        </head>
        <body>
            <H2>USER LOGIN FORM</H2>
            <form method="post" action="submit login">
                <input type="text" name="username" placeholder="Enter your username" required>
                <br><br>
                <input type="password" name="password" placeholder="Enter your password" required="">
                <br><br>
                <button type="submit">Login</button>
            </form>

        </body>
    </html>
