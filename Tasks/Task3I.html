<!-- Design a card component using HTML and CSS.
The card should contain a heading and a paragraph. Use the padding property to create proper space between the content and the card’s border so that the text does not touch the edges. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Card Component</title>
    <style>
        .card {
            border: 1px solid #ccc;
            padding: 20px;
            margin: 20px;
            max-width: 300px;
        }
        .card h2 {
            margin-top: 0;
        }
        .card p {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Card Heading</h2>
        <p>This is a card component designed using HTML and CSS. It contains a heading and a paragraph with proper padding to ensure the text does not touch the edges of the card.</p>
    </div>
</body>
</html>
