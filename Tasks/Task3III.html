<!DOCTYPE html>
<html lang="en">
<head>
    <title>Notification Box Example</title>
    <style>
        .notification {
            width: 60%;
            margin: 40px auto;
            padding: 24px;
            background: #9fecdf;
            border-width: 4px;
            border-style: solid;
            border-color: #d44926;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>
    <div class="notification">
        Important: Please submit your assignment by Friday 5 PM to avoid late penalties.
    </div>
</body>
</html>
